<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1814" />
    <meta
      name="description"
      content="A calm, structured digital edition of Plutarch’s Parallel Lives."
    />
    <!-- Non-blocking webfonts; system serifs already work offline / on Kindle. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Vitae — Plutarch’s Lives</title>
    <style>
      .boot-fallback {
        display: none;
        max-width: 28rem;
        margin: 3rem auto;
        padding: 1.5rem;
        font-family: Palatino, Georgia, serif;
        line-height: 1.5;
        color: #1a1814;
      }
      .boot-fallback h1 {
        font-size: 1.75rem;
        margin: 0 0 0.75rem;
      }
      .boot-fallback p {
        margin: 0 0 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-fallback" class="boot-fallback" hidden>
      <h1>Vitae</h1>
      <p>
        This Kindle’s Experimental Browser is too old for the reading app
        (it can’t run modern JavaScript or reliable page columns).
      </p>
      <p>
        Please open the same link on a phone, tablet, computer, or Fire tablet
        (Silk). The e-ink Experimental Browser isn’t a supported reading
        environment.
      </p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
